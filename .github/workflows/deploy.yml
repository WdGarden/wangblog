# 构建 VitePress 站点并部署到 GitHub Pages
name: Deploy VitePress site to Pages

on:
  # 推送到 main 分支时触发（如果你的默认分支是 master，请改为 master）
  push:
    branches: [master]

  # 允许你从 Actions 标签手动运行
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过正在运行的排队部署之间的队列
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # 或 yarn / pnpm
      - name: Install dependencies
        run: npm ci # 或 yarn install / pnpm install
      - name: Build with VitePress
        run: npm run docs:build # 对应 package.json 中的脚本
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # 构建输出目录

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4